name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Apktool
        run: sudo apt-get update && sudo apt-get install -y apktool
      - name: Build APK
        run: apktool b torch_dec -o torch_injected.apk
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: mon_app_build
          path: torch_injected.apk
          
